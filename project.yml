# XcodeGen project specification for BrownBear.
# Generate the Xcode project with:  xcodegen generate   (brew install xcodegen)
# This keeps the project definition reviewable in git instead of an opaque .pbxproj.

name: BrownBear
options:
  bundleIdPrefix: com.brownbear
  deploymentTarget:
    iOS: "16.4"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  # MIT — consumed as a dependency (used by Module 5's ScriptEditorView).
  Runestone:
    url: https://github.com/simonbs/Runestone.git
    from: "0.4.0"
  # MIT — pre-compiled Tree-sitter languages for Runestone. We use the JavaScript grammar to
  # syntax-highlight the userscript editor (the theme's token colors were already wired for it).
  TreeSitterLanguages:
    url: https://github.com/simonbs/TreeSitterLanguages.git
    from: "0.1.0"

targets:
  BrownBear:
    type: application
    platform: iOS
    deploymentTarget: "16.4"
    sources:
      - path: BrownBear
        excludes:
          - "**/.gitkeep"
    info:
      path: BrownBear/App/Info.plist
      properties:
        CFBundleDisplayName: BrownBear
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.brownbear.refresh
          - com.brownbear.processing
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brownbear.app
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        TARGETED_DEVICE_FAMILY: "1,2"
        # Calling evaluateJavaScript(_:in:in:) from Swift links the Swift WebKit overlay
        # (libswiftWebKit.dylib), which iOS 18 dropped from its runtime — so a 16.4-deployment app
        # aborts at launch. We route that one call through an Objective-C shim (BBWebKitBridge),
        # exposed via this bridging header, so no Swift WebKit overlay is linked.
        SWIFT_OBJC_BRIDGING_HEADER: BrownBear/BrownBear-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      - package: Runestone
      - package: TreeSitterLanguages
        product: TreeSitterJavaScriptRunestone

  BrownBearTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.4"
    sources:
      - path: BrownBearTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brownbear.app.tests
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks /usr/lib/swift"
    dependencies:
      - target: BrownBear

schemes:
  BrownBear:
    build:
      targets:
        BrownBear: all
        BrownBearTests: [test]
    test:
      targets:
        - BrownBearTests
      gatherCoverageData: true
