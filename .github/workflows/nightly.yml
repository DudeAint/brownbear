name: Nightly

# Rolling NIGHTLY build from the tip of `main`. Runs every night and on every push to main.
# It builds an unsigned .ipa, (re)points the `nightly` pre-release tag at the latest commit,
# and publishes a pre-release with auto-generated notes (every change since the last STABLE
# release). Uses the shared cached setup action for speed.
#
# Stability contract:
#   - `nightly`  -> bleeding edge, may break. Marked as a GitHub *pre-release*.
#   - `vX.Y.Z`   -> stable, hand-cut releases (see release.yml).

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build nightly IPA
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so setup-ios-build can restore mtimes → incremental builds
      - name: Setup iOS build (Xcode + XcodeGen + SPM cache)
        uses: ./.github/actions/setup-ios-build
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: .derived-data
          key: dd-nightly-${{ runner.os }}-${{ github.sha }}
          restore-keys: dd-nightly-${{ runner.os }}-
      - name: Build unsigned IPA
        # Debug, not Release: the nightly is a bleeding-edge build for on-device testing, and a Debug
        # build (no whole-module optimization) compiles far faster and benefits from incremental caching,
        # turning the ~30-minute nightly into a few minutes. Stable vX.Y.Z releases stay Release-built.
        run: |
          set -o pipefail
          xcodebuild build \
            -project BrownBear.xcodeproj -scheme BrownBear -configuration Debug \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath .spm-cache -derivedDataPath .derived-data \
            -quiet COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGNING_ALLOWED=NO
          APP=$(find .derived-data -name "*.app" -maxdepth 7 -type d | head -1)
          if [ -z "$APP" ]; then echo "::error::No .app produced"; exit 1; fi
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -qr BrownBear-nightly.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: BrownBear-nightly-ipa
          path: BrownBear-nightly.ipa
          if-no-files-found: error

  publish:
    name: Publish nightly pre-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: BrownBear-nightly-ipa
          path: dist
        continue-on-error: true
      - name: Move the `nightly` tag to HEAD
        run: |
          git tag -f nightly
          git push -f origin refs/tags/nightly
      - name: Publish / update the nightly pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_STABLE=$(git tag -l 'v*' --sort=-version:refname | head -1)
          RANGE_DESC="all changes so far"
          if [ -n "$LAST_STABLE" ]; then RANGE_DESC="changes since ${LAST_STABLE}"; fi
          {
            echo "Automated nightly build from \`main\` @ \`$(git rev-parse --short HEAD)\`."
            echo
            echo "⚠️ **Pre-release / bleeding edge** — for stable builds use a \`vX.Y.Z\` release."
            echo
            echo "### Recent ${RANGE_DESC}"
            if [ -n "$LAST_STABLE" ]; then LOGRANGE="${LAST_STABLE}..HEAD"; else LOGRANGE="HEAD"; fi
            git log "$LOGRANGE" --pretty='- %s (%h)' --no-merges | head -50
          } > NIGHTLY_NOTES.md
          ASSETS=""
          [ -f dist/BrownBear-nightly.ipa ] && ASSETS="dist/BrownBear-nightly.ipa"
          gh release delete nightly --yes --cleanup-tag=false 2>/dev/null || true
          gh release create nightly $ASSETS \
            --title "Nightly ($(date -u +%Y-%m-%d))" \
            --notes-file NIGHTLY_NOTES.md \
            --prerelease \
            --target "$GITHUB_SHA"
