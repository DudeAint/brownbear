name: CodeQL

# Static security analysis. This app runs untrusted JavaScript, so we scan both our Swift and
# the injected JS runtime for vulnerabilities on every push, PR, and weekly.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'swift' && 'macos-15' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        language: [swift, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Setup iOS build (Xcode + XcodeGen + SPM cache)
        if: matrix.language == 'swift'
        uses: ./.github/actions/setup-ios-build
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Build Swift
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project BrownBear.xcodeproj -scheme BrownBear \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath .spm-cache \
            -quiet COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGNING_ALLOWED=NO
      - name: Autobuild (JS)
        if: matrix.language != 'swift'
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
