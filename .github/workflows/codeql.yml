name: CodeQL

# Static security analysis. This app runs untrusted JavaScript, so we scan both our Swift and
# the injected JS runtime for vulnerabilities on every push, PR, and weekly.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'swift' && 'macos-14' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        language: [swift, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 15.4
        if: matrix.language == 'swift'
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Build Swift (XcodeGen)
        if: matrix.language == 'swift'
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild build \
            -project BrownBear.xcodeproj -scheme BrownBear \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
      - name: Autobuild (JS)
        if: matrix.language != 'swift'
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
