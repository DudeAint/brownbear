name: CodeQL

# Static security analysis. This app runs untrusted JavaScript, so we scan both our Swift and the
# injected JS runtime for vulnerabilities. NOT on pull_request: the Swift CodeQL job is a second
# full macOS build that competes with the gating "Build & Test" for the scarce macOS runner pool,
# badly slowing PR turnaround. It still runs on every push to main + weekly + on demand.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC
  workflow_dispatch:

# Only ever keep the NEWEST CodeQL scan per branch in flight. The Swift matrix leg is a full macOS
# build, so a burst of main pushes (e.g. several PRs merged back-to-back) otherwise stacks up that many
# macOS CodeQL builds, starving the scarce macOS runner pool and queueing the gating "Build & Test".
# A scan only cares about the latest code, so cancelling the older in-progress scan is exactly right.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'swift' && 'macos-15' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        language: [swift, javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Setup iOS build (Xcode + XcodeGen + SPM cache)
        if: matrix.language == 'swift'
        uses: ./.github/actions/setup-ios-build
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Build Swift
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project BrownBear.xcodeproj -scheme BrownBear \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath .spm-cache \
            -quiet COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGNING_ALLOWED=NO
      - name: Autobuild (JS)
        if: matrix.language != 'swift'
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
