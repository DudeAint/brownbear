name: Greetings

# Welcomes first-time contributors on their first issue / PR.
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    # The welcome message is best-effort: first-interaction only posts on a contributor's very
    # first issue/PR and exits non-zero otherwise, which would otherwise redden every repeat PR.
    # It must never gate or fail a pull request.
    continue-on-error: true
    steps:
      - uses: actions/first-interaction@v3
        continue-on-error: true
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Thanks for opening your first issue on BrownBear! A maintainer will triage it
            soon. If this is a security report, please instead follow SECURITY.md. 🐻
          pr-message: >
            🎉 Thanks for your first pull request to BrownBear! Please make sure it follows
            CLAUDE.md / AGENTS.md (no stubs, tests included, Conventional Commit title) — CI
            will check the rest. Welcome aboard! 🐻
