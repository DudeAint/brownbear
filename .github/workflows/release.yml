name: Release

# STABLE releases. Triggered by pushing a SemVer tag `vX.Y.Z` (or `vX.Y.Z-rc.N`).
# It categorizes commits since the previous stable tag into Features / Fixes / Performance /
# Other using Conventional Commit prefixes, writes patch notes, updates CHANGELOG context,
# builds a signed-off artifact (when the Xcode project exists), and publishes a GitHub Release.
#
#   git tag v0.1.0 && git push origin v0.1.0     # cut a stable release
#   git tag v0.1.0-rc.1 && git push origin ...    # release candidate (marked pre-release)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact
    runs-on: macos-14
    outputs:
      built: ${{ steps.detect.outputs.built }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Xcode project
        id: detect
        run: |
          if ls **/*.xcodeproj/project.pbxproj **/*.xcworkspace/contents.xcworkspacedata >/dev/null 2>&1; then
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release app (when project exists)
        if: steps.detect.outputs.built == 'true'
        run: |
          set -o pipefail
          sudo xcode-select -s /Applications/Xcode_15.4.app
          PROJ=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          FLAG="-workspace"; [ -z "$PROJ" ] && PROJ=$(ls -d *.xcodeproj | head -1) && FLAG="-project"
          xcodebuild build $FLAG "$PROJ" -scheme BrownBear -configuration Release \
            -destination 'generic/platform=iOS Simulator' -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO | xcpretty
          APP=$(find build -name "*.app" -maxdepth 6 | head -1)
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -r "BrownBear-${GITHUB_REF_NAME}.ipa" Payload >/dev/null
      - uses: actions/upload-artifact@v4
        if: steps.detect.outputs.built == 'true'
        with:
          name: release-ipa
          path: "BrownBear-*.ipa"
          if-no-files-found: ignore

  publish:
    name: Publish stable release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: dist
        continue-on-error: true
      - name: Generate categorized patch notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV" ]; then RANGE="${PREV}..${TAG}"; HDR="## ${TAG} — changes since ${PREV}";
          else RANGE="${TAG}"; HDR="## ${TAG} — first release"; fi

          feats=$(git log "$RANGE" --no-merges --pretty='%s|%h' | grep -E '^feat(\(|!|:)'      | sed -E 's/^feat(\([a-z0-9-]+\))?!?: ?/- /; s/\|/ (/; s/$/)/' || true)
          fixes=$(git log "$RANGE" --no-merges --pretty='%s|%h' | grep -E '^fix(\(|!|:)'        | sed -E 's/^fix(\([a-z0-9-]+\))?!?: ?/- /; s/\|/ (/; s/$/)/' || true)
          perf=$(git log "$RANGE"  --no-merges --pretty='%s|%h' | grep -E '^perf(\(|!|:)'       | sed -E 's/^perf(\([a-z0-9-]+\))?!?: ?/- /; s/\|/ (/; s/$/)/' || true)
          other=$(git log "$RANGE" --no-merges --pretty='%s|%h' | grep -vE '^(feat|fix|perf)(\(|!|:)' | sed -E 's/^([a-z]+)(\([a-z0-9-]+\))?!?: ?/- \1: /; s/\|/ (/; s/$/)/' || true)
          breaking=$(git log "$RANGE" --no-merges --pretty='%b' | grep -E '^BREAKING CHANGE:' | sed 's/^/- /' || true)

          {
            echo "$HDR"
            echo
            [ -n "$breaking" ] && { echo "### ⚠️ Breaking Changes"; echo "$breaking"; echo; }
            [ -n "$feats" ]    && { echo "### ✨ New Features";       echo "$feats"; echo; }
            [ -n "$fixes" ]    && { echo "### 🐛 Bug Fixes";          echo "$fixes"; echo; }
            [ -n "$perf" ]     && { echo "### ⚡ Performance";         echo "$perf";  echo; }
            [ -n "$other" ]    && { echo "### 🔧 Other Changes";      echo "$other"; echo; }
            echo "---"
            echo "**Full diff:** \`${RANGE}\`"
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

          # Mark RCs / pre-1.0 RC tags as pre-release.
          if echo "$TAG" | grep -q '-'; then echo "prerelease=true" >> "$GITHUB_OUTPUT"; else echo "prerelease=false" >> "$GITHUB_OUTPUT"; fi
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRE=""; [ "${{ steps.notes.outputs.prerelease }}" = "true" ] && PRE="--prerelease"
          ASSETS=""; [ -d dist ] && ASSETS=$(ls dist/*.ipa 2>/dev/null || true)
          gh release create "${GITHUB_REF_NAME}" $ASSETS \
            --title "BrownBear ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            $PRE
