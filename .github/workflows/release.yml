name: Release

# STABLE releases. Triggered by pushing a SemVer tag `vX.Y.Z` (or `vX.Y.Z-rc.N`).
# Builds an unsigned .ipa, categorizes commits since the previous stable tag into Features /
# Fixes / Performance / Breaking / Other patch notes, and publishes a GitHub Release.
# Uses the shared cached setup action for speed.
#
#   git tag v0.1.0 && git push origin v0.1.0      # cut a stable release
#   git tag v0.1.0-rc.1 && git push origin ...     # release candidate (marked pre-release)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release IPA
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Setup iOS build (Xcode + XcodeGen + SPM cache)
        uses: ./.github/actions/setup-ios-build
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: .derived-data
          key: dd-release-${{ runner.os }}-${{ github.sha }}
          restore-keys: dd-release-${{ runner.os }}-
      - name: Build unsigned IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project BrownBear.xcodeproj -scheme BrownBear -configuration Release \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath .spm-cache -derivedDataPath .derived-data \
            -quiet COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGNING_ALLOWED=NO
          APP=$(find .derived-data -name "*.app" -maxdepth 7 -type d | head -1)
          if [ -z "$APP" ]; then echo "::error::No .app produced"; exit 1; fi
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -qr "BrownBear-${GITHUB_REF_NAME}.ipa" Payload
      - uses: actions/upload-artifact@v7
        with:
          name: release-ipa
          path: "BrownBear-*.ipa"
          if-no-files-found: error

  publish:
    name: Publish stable release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: dist
        continue-on-error: true
      - name: Generate categorized patch notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV" ]; then RANGE="${PREV}..${TAG}"; HDR="## ${TAG} — changes since ${PREV}";
          else RANGE="${TAG}"; HDR="## ${TAG} — first release"; fi

          feats=$(git log "$RANGE" --no-merges --pretty='%s|%h' | grep -E '^feat(\(|!|:)'      | sed -E 's/^feat(\([a-z0-9-]+\))?!?: ?/- /; s/\|/ (/; s/$/)/' || true)
          fixes=$(git log "$RANGE" --no-merges --pretty='%s|%h' | grep -E '^fix(\(|!|:)'        | sed -E 's/^fix(\([a-z0-9-]+\))?!?: ?/- /; s/\|/ (/; s/$/)/' || true)
          perf=$(git log "$RANGE"  --no-merges --pretty='%s|%h' | grep -E '^perf(\(|!|:)'       | sed -E 's/^perf(\([a-z0-9-]+\))?!?: ?/- /; s/\|/ (/; s/$/)/' || true)
          other=$(git log "$RANGE" --no-merges --pretty='%s|%h' | grep -vE '^(feat|fix|perf)(\(|!|:)' | sed -E 's/^([a-z]+)(\([a-z0-9-]+\))?!?: ?/- \1: /; s/\|/ (/; s/$/)/' || true)
          breaking=$(git log "$RANGE" --no-merges --pretty='%b' | grep -E '^BREAKING CHANGE:' | sed 's/^/- /' || true)

          {
            echo "$HDR"
            echo
            [ -n "$breaking" ] && { echo "### ⚠️ Breaking Changes"; echo "$breaking"; echo; }
            [ -n "$feats" ]    && { echo "### ✨ New Features";       echo "$feats"; echo; }
            [ -n "$fixes" ]    && { echo "### 🐛 Bug Fixes";          echo "$fixes"; echo; }
            [ -n "$perf" ]     && { echo "### ⚡ Performance";         echo "$perf";  echo; }
            [ -n "$other" ]    && { echo "### 🔧 Other Changes";      echo "$other"; echo; }
            echo "---"
            echo "**Full diff:** \`${RANGE}\`"
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

          if echo "$TAG" | grep -q '-'; then echo "prerelease=true" >> "$GITHUB_OUTPUT"; else echo "prerelease=false" >> "$GITHUB_OUTPUT"; fi
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRE=""; [ "${{ steps.notes.outputs.prerelease }}" = "true" ] && PRE="--prerelease"
          ASSETS=""; [ -d dist ] && ASSETS=$(ls dist/*.ipa 2>/dev/null || true)
          gh release create "${GITHUB_REF_NAME}" $ASSETS \
            --title "BrownBear ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            $PRE
