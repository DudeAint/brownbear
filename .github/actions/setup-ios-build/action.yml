name: "Setup iOS build"
description: "Select Xcode, install XcodeGen, generate the project, and restore SwiftPM cache."

# A reusable composite action so every workflow (CI, CodeQL, nightly, release) shares one fast,
# consistent setup. The slow part of iOS CI is resolving/compiling Swift packages — we pin the
# clone path and cache it, keyed on project.yml (which pins dependency versions).

inputs:
  xcode:
    description: "Xcode version to select"
    required: false
    default: "15.4"

runs:
  using: composite
  steps:
    - name: Select Xcode ${{ inputs.xcode }}
      shell: bash
      run: sudo xcode-select -s "/Applications/Xcode_${{ inputs.xcode }}.app"

    - name: Install XcodeGen
      shell: bash
      run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

    - name: Generate Xcode project
      shell: bash
      run: xcodegen generate

    - name: Restore SwiftPM cache
      uses: actions/cache@v4
      with:
        path: .spm-cache
        key: spm-${{ runner.os }}-${{ inputs.xcode }}-${{ hashFiles('project.yml') }}
        restore-keys: |
          spm-${{ runner.os }}-${{ inputs.xcode }}-
          spm-${{ runner.os }}-

    - name: Resolve Swift packages (into cached path)
      shell: bash
      run: |
        xcodebuild -resolvePackageDependencies \
          -project BrownBear.xcodeproj -scheme BrownBear \
          -clonedSourcePackagesDirPath .spm-cache
